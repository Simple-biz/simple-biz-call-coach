version: '3.8'

services:
  sandbox-websocket:
    build:
      context: ./docker/sandbox
      dockerfile: Dockerfile
    container_name: devassist-sandbox
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - devassist-network

networks:
  devassist-network:
    driver: bridge
