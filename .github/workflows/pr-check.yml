name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run --exclude='tests/integration/**'
        # Integration tests require a live backend — excluded in CI

      - name: Build extension
        run: npm run build
        # Validates the full build including TypeScript compile and crxjs bundling
        # dist/ output is not published — this is a check only
